<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>範例 5 — 文繞圖 layoutNextLine()</title>
  <style>
    body { font-family: "Helvetica Neue", sans-serif; padding: 32px; background: #fafafa; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .desc { color: #666; margin-bottom: 24px; }
    canvas { border: 1px solid #ccc; border-radius: 8px; background: white; }
    #output {
      margin-top: 16px;
      background: #1e1e1e;
      color: #a6e22e;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>範例 5：文繞圖 — layoutNextLine()</h1>
  <p class="desc">
    layoutNextLine() 是逐行排版的迭代器，每行可以指定不同寬度。
    這裡示範文字繞過右上角的「圖片」。
  </p>

  <canvas id="canvas" width="520" height="400"></canvas>
  <pre id="output"></pre>

  <script type="module" src="./05-text-wrap-around-image.ts"></script>
</body>
</html>
